{% extends 'base.html' %}
{% block title %}{{ 'Edit' if medicine else 'Add' }} Medicine{% endblock %}
{% block page_title %}{{ 'Edit' if medicine else 'Add' }} Medicine{% endblock %}
{% block content %}
<div class="card" style="max-width:700px">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name *</label>
          <input type="text" name="name" class="form-control"
                 value="{{ medicine.name if medicine else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Generic Name</label>
          <input type="text" name="generic_name" class="form-control"
                 value="{{ medicine.generic_name if medicine else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Category</label>
          <input type="text" name="category" class="form-control"
                 value="{{ medicine.category if medicine else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Dosage Form</label>
          <input type="text" name="dosage_form" class="form-control"
                 placeholder="Tablet, Syrup…"
                 value="{{ medicine.dosage_form if medicine else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Strength</label>
          <input type="text" name="strength" class="form-control"
                 placeholder="500mg, 10ml…"
                 value="{{ medicine.strength if medicine else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Supplier</label>
          <select name="supplier_id" class="form-select">
            <option value="">— None —</option>
            {% for s in suppliers %}
            <option value="{{ s.id }}"
              {{ 'selected' if medicine and medicine.supplier_id == s.id }}>
              {{ s.name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Expiry Date</label>
          <input type="date" name="expiry_date" class="form-control"
                 value="{{ medicine.expiry_date if medicine else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Price (Rs.) *</label>
          <input type="number" step="0.01" name="price" class="form-control"
                 value="{{ medicine.price if medicine else '0' }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Reorder Level</label>
          <input type="number" name="reorder_level" class="form-control"
                 value="{{ medicine.reorder_level if medicine else '10' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Current Stock Qty</label>
          <input type="number" name="quantity" class="form-control"
                 value="{{ medicine.stock.quantity if medicine and medicine.stock else '0' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Batch Number</label>
          <input type="text" name="batch_number" class="form-control"
                 value="{{ medicine.stock.batch_number if medicine and medicine.stock else '' }}">
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> {{ 'Update' if medicine else 'Add' }} Medicine
        </button>
        <a href="{{ url_for('medicines.list') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
