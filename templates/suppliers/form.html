{% extends 'base.html' %}
{% block title %}{{ 'Edit' if supplier else 'Add' }} Supplier{% endblock %}
{% block page_title %}{{ 'Edit' if supplier else 'Add' }} Supplier{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Company Name *</label>
          <input type="text" name="name" class="form-control"
                 value="{{ supplier.name if supplier else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Contact Person</label>
          <input type="text" name="contact_person" class="form-control"
                 value="{{ supplier.contact_person if supplier else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ supplier.phone if supplier else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ supplier.email if supplier else '' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea name="address" class="form-control" rows="3">{{ supplier.address if supplier else '' }}</textarea>
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> {{ 'Update' if supplier else 'Add' }} Supplier
        </button>
        <a href="{{ url_for('suppliers.list') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
